# 生产部署 compose（由 ./deploy.sh 使用）
#
# 端口说明：
#   宿主机 127.0.0.1:8080  → web 容器 :80   （唯一对外入口，nginx 反代到这里）
#   Docker 内网 server:8080 → server 容器   （仅 web 容器访问，不映射宿主机）
#
# Web 和 API 共用同域名：web 容器内 nginx 将 /api/ 转发到 server:8080

services:
  server:
    image: tangge/sms-relay-server:${SMS_RELAY_VERSION:-latest}
    restart: unless-stopped
    # 生产环境不对外暴露 API 端口，由 web 容器内 nginx 转发 /api/
    expose:
      - "8080"
    environment:
      PORT: "8080"
      DATABASE_PATH: /data/smsrelay.db
      MIGRATIONS_DIR: /app/db/migrations
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER is required}
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY:?DATABASE_ENCRYPTION_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - smsrelay_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    image: tangge/sms-relay-web:${SMS_RELAY_VERSION:-latest}
    restart: unless-stopped
    # 宿主机唯一入口：nginx 反代到 127.0.0.1:WEB_PORT
    # 注意：server 的 8080 仅在 Docker 内网，不会映射到宿主机
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  smsrelay_data:
